<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Menu Manager{% endblock %}</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body            { background: #f8f5f0; }
    .navbar         { background: #1a1a1a !important; }
    .navbar-brand   { font-size: 1.3rem; letter-spacing: .5px; }
    /* Category badge colours */
    .cat-starter    { background: #f59e0b; color: #000; }
    .cat-main       { background: #22c55e; }
    .cat-dessert    { background: #ef4444; }
    .cat-beverage   { background: #38bdf8; color: #000; }
    .cat-side       { background: #a855f7; }
    /* Cards */
    .card           { border: none; border-radius: .75rem;
                      box-shadow: 0 1px 6px rgba(0,0,0,.08); }
    .card:hover     { box-shadow: 0 4px 16px rgba(0,0,0,.13);
                      transition: box-shadow .2s; }
    .opacity-75     { opacity: .75; }
  </style>
</head>
<body>

<nav class="navbar navbar-dark mb-4">
  <div class="container">
    <a class="navbar-brand fw-bold" href="{% url 'dish_list' %}">🍽️ Menu Manager</a>
    <a href="{% url 'dish_create' %}" class="btn btn-warning btn-sm fw-semibold">
      <i class="bi bi-plus-lg"></i> Add Dish
    </a>
  </div>
</nav>

<div class="container pb-5">
  {% if messages %}
    {% for msg in messages %}
      <div class="alert alert-{{ msg.tags }} alert-dismissible fade show" role="alert">
        {{ msg }}
        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
      </div>
    {% endfor %}
  {% endif %}

  {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
