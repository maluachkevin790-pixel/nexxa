{% extends 'menu/base.html' %}
{% block title %}Delete {{ dish.name }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="card border-danger shadow-sm">

      <div class="card-header bg-danger text-white">
        <h4 class="mb-0"><i class="bi bi-exclamation-triangle-fill"></i> Confirm Delete</h4>
      </div>

      <div class="card-body text-center py-5">
        <p class="fs-5 text-muted mb-1">You are about to permanently remove</p>
        <p class="display-6 fw-bold text-danger mb-1">"{{ dish.name }}"</p>
        <p class="text-muted">
          {{ dish.get_category_display }} &nbsp;·&nbsp; ${{ dish.price }}
        </p>
        <hr>
        <p class="text-danger fw-semibold"><i class="bi bi-exclamation-circle"></i>
          This cannot be undone.
        </p>
      </div>

      <div class="card-footer bg-transparent d-flex justify-content-center gap-3 py-3">
        <a href="{% url 'dish_list' %}" class="btn btn-outline-secondary px-4">
          <i class="bi bi-arrow-left"></i> Cancel
        </a>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger px-4 fw-semibold">
            <i class="bi bi-trash-fill"></i> Yes, Delete
          </button>
        </form>
      </div>

    </div>
  </div>
</div>
{% endblock %}
